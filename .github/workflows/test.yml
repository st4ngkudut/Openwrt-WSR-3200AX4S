# by ST4NGKUDUT
name: 'Build OpenWrt WSR-3200AX4S v2'

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Ketik Versi OpenWrt (Contoh: v25.12.1, v24.10.0, atau snapshot)'
        required: true
        type: string
        default: 'v25.12.1'
      custom_packages:
        description: 'Daftar Paket Tambahan (Pisahkan dengan spasi)'
        required: false
        type: string
        default: 'luci luci-ssl wireguard-tools luci-app-wireguard htop nano'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Kode Repositori
        uses: actions/checkout@v4

      - name: 2. Siapkan Variabel Build & Ambil Vermagic
        id: build_vars
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          VERSION_NUM=$(echo "$VERSION" | sed 's/v//')
          
          # Tentukan URL direktori kmods
          if [[ "$VERSION" != "snapshot" ]]; then
            KMODS_URL="https://downloads.openwrt.org/releases/${VERSION_NUM}/targets/mediatek/mt7622/kmods/"
          else
            KMODS_URL="https://downloads.openwrt.org/snapshots/targets/mediatek/mt7622/kmods/"
          fi
          
          echo "Mencari versi kernel dan vermagic di: $KMODS_URL"
          
          # Ambil nama folder dari halaman index kmods menggunakan regex (Contoh: 6.12.74-1-2e14cd580d013ab4e512592b79bf44ae)
          FULL_KERNEL_VER=$(curl -sL "$KMODS_URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+-[0-9]+-[a-f0-9]{32}' | head -n 1)
          
          # Fallback ke metode lama (file Packages) jika folder kmods tidak ditemukan (untuk OpenWrt versi lawas)
          if [[ -z "$FULL_KERNEL_VER" ]]; then
            echo "Folder kmods tidak ditemukan, mencoba membaca dari index Packages lama..."
            if [[ "$VERSION" != "snapshot" ]]; then
              PACKAGES_URL="https://downloads.openwrt.org/releases/${VERSION_NUM}/targets/mediatek/mt7622/packages/Packages"
            else
              PACKAGES_URL="https://downloads.openwrt.org/snapshots/targets/mediatek/mt7622/packages/Packages"
            fi
            FULL_KERNEL_VER=$(curl -sL "$PACKAGES_URL" | awk '/^Package: kernel$/{f=1} f && /^Version:/{print $2; exit}')
          fi
          
          if [[ -z "$FULL_KERNEL_VER" ]]; then
            echo "::error::Gagal mengambil informasi kernel dari server OpenWrt."
            exit 1
          fi
          
          # Ekstrak vermagic dan tentukan config kernel
          VERMAGIC=$(echo "$FULL_KERNEL_VER" | awk -F'-' '{print $NF}')
          KERNEL_BASE=$(echo "$FULL_KERNEL_VER" | cut -d'-' -f1)
          KERNEL_MAJOR_MINOR=$(echo "$KERNEL_BASE" | cut -d'.' -f1,2)
          KERNEL_CONFIG="config-${KERNEL_MAJOR_MINOR}"
          
          echo "vermagic=$VERMAGIC" >> $GITHUB_OUTPUT
          echo "kernel_config=$KERNEL_CONFIG" >> $GITHUB_OUTPUT
          
          echo "✅ Target Version: $VERSION"
          echo "✅ Full Kernel String: $FULL_KERNEL_VER"
          echo "✅ Kernel Config: $KERNEL_CONFIG"
          echo "✅ Vermagic: $VERMAGIC"
      
      - name: 3. Instal Dependensi Build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libssl-dev python3-setuptools rsync unzip \
            zlib1g-dev file wget ccache

      - name: 4. Clone Repositori OpenWrt
        run: git clone https://git.openwrt.org/openwrt/openwrt.git

      - name: 5. Atur Cache Build
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/dl
            openwrt/.ccache
          key: ${{ runner.os }}-openwrt-${{ github.event.inputs.openwrt_version }}-${{ hashFiles('**/patches', '**/openwrt/.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ github.event.inputs.openwrt_version }}-

      - name: 6. Checkout Versi & Perbarui Feeds
        working-directory: ./openwrt
        run: |
          echo "BUILD_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          if [ "${{ github.event.inputs.openwrt_version }}" != "snapshot" ]; then
            git checkout ${{ github.event.inputs.openwrt_version }}
          fi
          
          for i in 1 2 3; do
            echo "Attempt $i to update feeds..."
            ./scripts/feeds update -a && break
            if [ $i -lt 3 ]; then
              echo "Feeds update failed. Retrying in 60 seconds..."
              sleep 60
            else
              echo "::error::Feeds update failed after 3 attempts."
              exit 1
            fi
          done
          
          ./scripts/feeds install -a
      
      - name: 7. Terapkan Konfigurasi & Modifikasi Kustom
        working-directory: ./openwrt
        run: |
          echo 'CONFIG_CCACHE=y' > .config
          
          if [ "${{ github.event.inputs.openwrt_version }}" != "snapshot" ]; then
            wget https://downloads.openwrt.org/releases/$(echo ${{ github.event.inputs.openwrt_version }} | sed 's/v//')/targets/mediatek/mt7622/config.buildinfo -O .config
          else
            cp target/linux/mediatek/mt7622/config.buildinfo .config
          fi
          echo "CONFIG_TARGET_mediatek_mt7622_DEVICE_buffalo_wsr-3200ax4s=y" >> .config
          
          # --- Eksekusi Daftar Paket Kustom dari Input ---
          CUSTOM_PKGS="${{ github.event.inputs.custom_packages }}"
          if [ -n "$CUSTOM_PKGS" ]; then
            echo "⚙️ Memproses paket kustom..."
            for pkg in $CUSTOM_PKGS; do
              if [[ $pkg == -* ]]; then
                # Jika diawali tanda '-', hapus paket (disable)
                clean_pkg="${pkg#-}"
                echo "# CONFIG_PACKAGE_$clean_pkg is not set" >> .config
                echo "❌ Dihapus: $clean_pkg"
              else
                # Jika tidak, tambahkan paket (enable)
                echo "CONFIG_PACKAGE_$pkg=y" >> .config
                echo "✅ Ditambahkan: $pkg"
              fi
            done
          fi
          
          make defconfig

          cp ../patches/mt7622-buffalo-wsr-3200ax4s.dts ./target/linux/mediatek/dts/
          
          echo "CONFIG_MTD_VIRT_CONCAT=y" >> ./target/linux/mediatek/mt7622/${{ steps.build_vars.outputs.kernel_config }}
          
          echo "${{ steps.build_vars.outputs.vermagic }}" > ./vermagic
          sed -i 's|grep '\''=\[ym\]'\'' $(LINUX_DIR)/.config.set \| LC_ALL=C sort \| $(MKHASH) md5 > $(LINUX_DIR)/.vermagic|cp $(TOPDIR)/vermagic $(LINUX_DIR)/.vermagic|g' ./include/kernel-defaults.mk
          sed -i 's|STAMP_BUILT:=$(STAMP_BUILT)_$(shell $(SCRIPT_DIR)/kconfig.pl $(LINUX_DIR)/.config \| $(MKHASH) md5)|STAMP_BUILT:=$(STAMP_BUILT)_$(shell cat $(LINUX_DIR)/.vermagic)|g' ./package/kernel/linux/Makefile
      
      - name: 8. Mulai Proses Build
        working-directory: ./
        env:
          CCACHE_DIR: ${{ github.workspace }}/openwrt/.ccache
          USE_CCACHE: 1
        run: |
          ccache -s
          make -j$(nproc) -C openwrt download
          make -j$(nproc) -C openwrt world
          ccache -s

      - name: 9. Unggah Artefak Build
        uses: actions/upload-artifact@v4
        with:
          name: WSR-3200AX4S-Firmware-${{ github.event.inputs.openwrt_version }}-${{ env.BUILD_DATE }}
          path: |
            ./openwrt/bin/targets/mediatek/mt7622/*-initramfs-kernel.bin
            ./openwrt/bin/targets/mediatek/mt7622/*-squashfs-factory-uboot.bin
            ./openwrt/bin/targets/mediatek/mt7622/*-squashfs-sysupgrade.bin
            ./openwrt/bin/targets/mediatek/mt7622/config.buildinfo
